name: nosso_gas
description: Sistema de entrega automática de gás.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.0
  http: ^1.1.0
  provider: ^6.1.1
  geolocator: ^10.1.0
  flutter_polyline_points: ^2.0.0
  location: ^5.0.3
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/sonangol.png
    - assets/images/canata.png
